name: hx-resume

services:
  backend:
    image: ghcr.io/hengxin666/hx-resume-backend:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: sqlite+aiosqlite:////app/database/hx_resume.db

      # 管理员账号和密码：部署前必须修改密码，至少 12 位。
      AUTH_USERNAME: "admin"
      AUTH_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"

      SESSION_MAX_AGE: "43200"
      # 通过雷池等 HTTPS 反向代理访问时建议改为 "true"。
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - resume_database:/app/database
      - resume_data:/app/data
      - resume_uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 20s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ghcr.io/hengxin666/hx-resume-frontend:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 只开放 Web；需要修改端口时只改左侧 8080。
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 3s
      start_period: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true

volumes:
  resume_database:
  resume_data:
  resume_uploads:
